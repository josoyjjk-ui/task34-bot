<!doctype html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>공병 Computer Use 테스트</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      background: #2ecc71;
      color: #ffffff;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Noto Sans KR", sans-serif;
      text-align: center;
    }
    h1 {
      margin: 0 0 12px;
      font-size: 2rem;
      font-weight: 800;
    }
    p {
      margin: 0;
      font-size: 1.1rem;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <h1>공병 Computer Use 테스트 완료</h1>
  <p id="now"></p>

  <script>
    const nowEl = document.getElementById('now');
    const now = new Date();
    nowEl.textContent = `현재 날짜/시간: ${now.toLocaleString('ko-KR')}`;
  </script>
</body>
</html>
