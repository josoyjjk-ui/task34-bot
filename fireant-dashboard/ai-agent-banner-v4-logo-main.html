<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>불개미 로고 메인 배너</title>
<style>
*{box-sizing:border-box} body{margin:0;background:#0a0d16}
.banner{width:1600px;height:900px;position:relative;overflow:hidden;
background:
radial-gradient(1000px 520px at 22% 18%, rgba(255,84,64,.22), transparent 62%),
radial-gradient(780px 440px at 86% 82%, rgba(124,176,255,.16), transparent 62%),
linear-gradient(135deg,#0a1022,#0a0d16 74%);
}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:44px 44px}
.scene{position:absolute;inset:0;z-index:2}
.vignette{position:absolute;inset:0;background:radial-gradient(circle at 45% 55%, transparent 34%, rgba(0,0,0,.36) 100%)}
</style>
</head>
<body>
<div class="banner">
  <div class="grid"></div>

  <div style="position:absolute;top:34px;left:0;right:0;text-align:center;z-index:4;font-family:'Noto Sans KR',sans-serif;font-weight:900;font-size:100px;letter-spacing:-1.4px;background:linear-gradient(90deg,#ff5a45,#ffb06a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">크립토 이후 두번째 기회 AI</div>

  <svg class="scene" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <linearGradient id="floor" x1="180" y1="760" x2="1410" y2="760" gradientUnits="userSpaceOnUse">
        <stop stop-color="#FF624A"/>
        <stop offset="1" stop-color="#FF9E5B"/>
      </linearGradient>
      <radialGradient id="logoGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(620 500) rotate(90) scale(340 340)">
        <stop stop-color="#FF7A53" stop-opacity=".36"/>
        <stop offset="1" stop-color="#FF7A53" stop-opacity="0"/>
      </radialGradient>
      <radialGradient id="robotGlow" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1130 520) rotate(90) scale(220 220)">
        <stop stop-color="#7FB6FF" stop-opacity=".24"/>
        <stop offset="1" stop-color="#7FB6FF" stop-opacity="0"/>
      </radialGradient>
      <linearGradient id="link" x1="790" y1="500" x2="1035" y2="520" gradientUnits="userSpaceOnUse">
        <stop stop-color="#FFB07A"/>
        <stop offset="1" stop-color="#90BEFF"/>
      </linearGradient>
    </defs>

    <circle cx="620" cy="500" r="340" fill="url(#logoGlow)"/>
    <circle cx="1130" cy="520" r="220" fill="url(#robotGlow)"/>

    <path d="M180 760H1410" stroke="url(#floor)" stroke-width="5" stroke-linecap="round"/>

    <!-- 불개미 로고를 메인 피사체로 크게 배치 -->
    <image href="./fireant-logo-nobg.png" x="360" y="190" width="520" height="520" preserveAspectRatio="xMidYMid meet"/>

    <!-- 로고가 고민하는 느낌(생각 버블) -->
    <circle cx="840" cy="280" r="20" fill="#8FBFFF" fill-opacity="0.78"/>
    <circle cx="885" cy="250" r="14" fill="#8FBFFF" fill-opacity="0.62"/>
    <circle cx="920" cy="224" r="9" fill="#8FBFFF" fill-opacity="0.52"/>

    <!-- 직관적인 로봇 형태 (보조) -->
    <g opacity="0.95">
      <!-- antenna -->
      <line x1="1125" y1="410" x2="1125" y2="386" stroke="#8EBBFF" stroke-width="4" stroke-linecap="round"/>
      <circle cx="1125" cy="378" r="8" fill="#7FB6FF"/>

      <!-- head -->
      <rect x="1055" y="420" width="140" height="110" rx="22" fill="#152443" stroke="#8EBBFF" stroke-width="3"/>
      <circle cx="1098" cy="474" r="12" fill="#A9CDFF"/>
      <circle cx="1152" cy="474" r="12" fill="#A9CDFF"/>
      <rect x="1092" y="505" width="66" height="10" rx="5" fill="#7DAFFF"/>

      <!-- body -->
      <rect x="1072" y="540" width="106" height="120" rx="18" fill="#111C34" stroke="#88B8FF" stroke-width="2.5"/>
      <rect x="1098" y="568" width="54" height="38" rx="8" fill="#1F315C" stroke="#9CC5FF"/>

      <!-- arms -->
      <rect x="1022" y="556" width="44" height="16" rx="8" fill="#2B436D"/>
      <rect x="1184" y="556" width="44" height="16" rx="8" fill="#2B436D"/>
      <circle cx="1014" cy="564" r="10" fill="#3B5B91"/>
      <circle cx="1236" cy="564" r="10" fill="#3B5B91"/>

      <!-- legs -->
      <rect x="1090" y="660" width="24" height="52" rx="10" fill="#2A4069"/>
      <rect x="1136" y="660" width="24" height="52" rx="10" fill="#2A4069"/>
      <rect x="1082" y="708" width="38" height="10" rx="5" fill="#3E5D95"/>
      <rect x="1132" y="708" width="38" height="10" rx="5" fill="#3E5D95"/>
    </g>

    <!-- 고민 연결선 -->
    <path d="M790 500C870 500 945 505 1035 520" stroke="url(#link)" stroke-width="4" stroke-linecap="round"/>
    <path d="M772 550C860 560 935 545 1030 538" stroke="#86B4FF" stroke-opacity=".45" stroke-width="2.5" stroke-linecap="round"/>
  </svg>

  <div class="vignette"></div>
</div>
</body>
</html>
