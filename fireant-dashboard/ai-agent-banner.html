<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>불개미 AI Agent 배너</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@500;700;900&display=swap');
  *{box-sizing:border-box} body{margin:0;background:#0a0d16;font-family:'Noto Sans KR',sans-serif}
  .banner{
    width:1600px;height:900px;position:relative;overflow:hidden;
    background: radial-gradient(1200px 500px at 20% 10%, rgba(255,69,58,.14), transparent 60%),
                radial-gradient(900px 500px at 85% 90%, rgba(255,140,70,.10), transparent 60%),
                linear-gradient(135deg,#0b1020 0%, #0f1326 45%, #0a0d16 100%);
    color:#eef2ff;
  }
  .glow{position:absolute;inset:auto -140px -200px auto;width:650px;height:650px;border-radius:50%;background:radial-gradient(circle,rgba(255,74,61,.20),transparent 65%)}
  .grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:40px 40px;mask-image:linear-gradient(to bottom,transparent,black 25%,black 80%,transparent)}
  .wrap{position:relative;z-index:2;display:flex;flex-direction:column;justify-content:space-between;height:100%;padding:64px 72px}
  .top{display:flex;align-items:center;gap:18px}
  .logo{width:84px;height:84px;object-fit:contain;filter:drop-shadow(0 0 18px rgba(255,80,60,.35))}
  .brand{font-size:46px;font-weight:900;letter-spacing:-1px;background:linear-gradient(90deg,#ff4a3d,#ff8f45);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
  .tag{margin-top:6px;font-size:19px;color:#b8c2e0}
  .pill{display:inline-block;margin-top:24px;padding:10px 18px;border:1px solid rgba(255,120,90,.45);border-radius:999px;color:#ffd3bf;background:rgba(255,90,60,.08);font-weight:700;font-size:16px}
  h1{margin:22px 0 0 0;max-width:1200px;line-height:1.2;font-size:62px;font-weight:900;letter-spacing:-1.4px}
  .sub{margin-top:18px;max-width:1150px;font-size:28px;line-height:1.45;color:#dbe4ff}
  .footer{display:flex;justify-content:space-between;align-items:flex-end}
  .quote{font-size:24px;color:#ffbe9f;font-weight:700}
  .handle{font-size:22px;color:#9fb0d9}
  .accent{color:#ff9a66}
</style>
</head>
<body>
  <div class="banner">
    <div class="grid"></div><div class="glow"></div>
    <div class="wrap">
      <div>
        <div class="top">
          <img class="logo" src="./fireant-logo-nobg.png" alt="불개미 로고" />
          <div>
            <div class="brand">불개미 CRYPTO</div>
            <div class="tag">2016→2026, 10년 크립토 실전가의 AI Agent 선언</div>
          </div>
        </div>
        <span class="pill">AI Agent INSIGHT</span>
        <h1>블록체인은 모두를 위하여,<br><span class="accent">AI는 적응한 자를 위하여</span></h1>
        <div class="sub">대체되지 않으려면 장악해야 합니다.<br>AI 시대, 지능보다 중요한 건 결국 <span class="accent">신용·평판·책임</span>입니다.</div>
      </div>
      <div class="footer">
        <div class="quote">"시작은 미약하지만 끝도 미약하리라는 법은 없습니다."</div>
        <div class="handle">@fireantcrypto · @ROKMCFIREANT</div>
      </div>
    </div>
  </div>
</body>
</html>
