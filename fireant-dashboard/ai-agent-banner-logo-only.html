<!doctype html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>불개미 로고 배너</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@900&display=swap');
*{box-sizing:border-box} body{margin:0;background:#0a0d16;font-family:'Noto Sans KR',sans-serif}
.banner{width:1600px;height:900px;display:flex;align-items:center;justify-content:center;background:radial-gradient(900px 420px at 15% 8%,rgba(255,80,60,.16),transparent 60%),radial-gradient(700px 400px at 88% 92%,rgba(255,140,70,.10),transparent 60%),linear-gradient(135deg,#0b1020,#0a0d16 70%);position:relative;overflow:hidden}
.grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.02) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.02) 1px,transparent 1px);background-size:44px 44px}
.top{position:relative;z-index:2;display:flex;align-items:center;gap:24px}
.logo{width:140px;height:140px;object-fit:contain;filter:drop-shadow(0 0 22px rgba(255,90,70,.4))}
.brand{font-size:92px;font-weight:900;letter-spacing:-2px;background:linear-gradient(90deg,#ff4a3d,#ff944d);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
</style>
</head>
<body>
<div class="banner">
  <div class="grid"></div>
  <div class="top">
    <img class="logo" src="./fireant-logo-nobg.png" alt="불개미 로고" />
    <div class="brand">불개미 CRYPTO</div>
  </div>
</div>
</body>
</html>
