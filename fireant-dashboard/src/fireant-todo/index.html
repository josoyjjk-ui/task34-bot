<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🔥 불개미 TODO</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>📋</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&family=Noto+Sans+KR:wght@400;600;700;900&display=swap');
  
  :root {
    --bg: #08080f;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,68,68,0.4);
    --red: #FF3B3B;
    --orange: #FF6B35;
    --gold: #FFD740;
    --blue: #5B8DEF;
    --green: #4ADE80;
    --purple: #A78BFA;
    --text: #E8E8ED;
    --text-dim: #6B6B80;
    --text-muted: #3E3E50;
    --glow-red: rgba(255,59,59,0.15);
    --radius: 14px;
    --radius-sm: 10px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: 'Noto Sans KR', 'Inter', -apple-system, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LOCK SCREEN ── */
  #lock-screen {
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    min-height: 100vh; gap: 16px;
  }
  #lock-screen h1 { font-size: 2rem; color: var(--red); }
  #lock-screen .subtitle { color: var(--text-dim); font-size: 0.85rem; }
  #lock-screen input {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 20px;
    color: var(--text); font-size: 1rem; width: 280px;
    text-align: center; outline: none;
    transition: border-color 0.3s;
  }
  #lock-screen input:focus { border-color: var(--red); }
  #lock-screen input::placeholder { color: var(--text-muted); }
  #lock-screen button {
    padding: 12px 40px;
    background: linear-gradient(135deg, var(--red), var(--orange));
    color: #fff; border: none; border-radius: var(--radius-sm);
    font-size: 0.9rem; font-weight: 700; cursor: pointer;
    transition: transform 0.2s;
  }
  #lock-screen button:hover { transform: scale(1.03); }
  .lock-error { color: var(--red); font-size: 0.8rem; min-height: 1.2em; }
  .lock-setup { color: var(--gold); font-size: 0.78rem; }

  /* ── MAIN APP ── */
  #app { display: none; max-width: 520px; margin: 0 auto; padding: 0 16px 80px; }

  .nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0;
    position: sticky; top: 0; z-index: 10;
    background: rgba(8,8,15,0.9);
    backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
  }
  .nav-brand { font-weight: 900; font-size: 1.1rem; color: var(--red); }
  .nav-right { display: flex; gap: 8px; align-items: center; }
  .nav-btn {
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); padding: 6px 12px; border-radius: 8px;
    font-size: 0.75rem; font-weight: 600; cursor: pointer;
    transition: all 0.2s;
  }
  .nav-btn:hover { color: var(--text); border-color: var(--border-hover); }

  /* ── STATS ── */
  .stats {
    display: flex; gap: 10px; margin: 20px 0;
  }
  .stat {
    flex: 1; text-align: center;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 8px;
  }
  .stat-num { font-size: 1.4rem; font-weight: 900; font-family: 'Inter'; }
  .stat-num.red { color: var(--red); }
  .stat-num.green { color: var(--green); }
  .stat-num.gold { color: var(--gold); }
  .stat-label { font-size: 0.68rem; color: var(--text-dim); margin-top: 2px; font-weight: 600; }

  /* ── ADD FORM ── */
  .add-form {
    display: flex; gap: 8px; margin-bottom: 20px;
    flex-wrap: wrap;
  }
  .add-input {
    flex: 1; min-width: 0;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 12px 16px;
    color: var(--text); font-size: 0.9rem; outline: none;
    transition: border-color 0.3s;
  }
  .add-input:focus { border-color: var(--red); }
  .add-input::placeholder { color: var(--text-muted); }
  
  .add-row2 { display: flex; gap: 8px; width: 100%; }
  .cat-select {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 10px 12px;
    color: var(--text-dim); font-size: 0.8rem; outline: none;
    cursor: pointer; flex: 1;
  }
  .add-btn {
    padding: 10px 20px;
    background: linear-gradient(135deg, var(--red), var(--orange));
    color: #fff; border: none; border-radius: var(--radius-sm);
    font-size: 0.85rem; font-weight: 700; cursor: pointer;
    transition: transform 0.2s; white-space: nowrap;
  }
  .add-btn:hover { transform: scale(1.03); }

  /* ── FILTER ── */
  .filters {
    display: flex; gap: 6px; margin-bottom: 16px;
    overflow-x: auto; scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    padding: 6px 14px; border-radius: 20px;
    background: var(--surface); border: 1px solid var(--border);
    color: var(--text-dim); font-size: 0.75rem; font-weight: 700;
    cursor: pointer; white-space: nowrap; transition: all 0.2s;
  }
  .filter-btn.active { background: var(--glow-red); color: var(--red); border-color: var(--red); }

  /* ── TODO ITEM ── */
  .todo-item {
    display: flex; align-items: center; gap: 12px;
    padding: 14px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    margin-bottom: 6px;
    transition: all 0.2s;
  }
  .todo-item:hover { border-color: var(--border-hover); background: var(--surface-hover); }
  .todo-item.done { opacity: 0.4; }
  .todo-item.done .todo-text { text-decoration: line-through; }
  
  .todo-check {
    width: 20px; height: 20px; min-width: 20px;
    border: 2px solid var(--text-muted); border-radius: 6px;
    cursor: pointer; display: flex; align-items: center;
    justify-content: center; transition: all 0.2s;
    background: transparent;
  }
  .todo-check:hover { border-color: var(--green); }
  .todo-check.checked { background: var(--green); border-color: var(--green); }
  .todo-check.checked::after { content: '✓'; color: #000; font-size: 0.7rem; font-weight: 900; }

  .todo-body { flex: 1; min-width: 0; }
  .todo-text { font-size: 0.88rem; font-weight: 600; line-height: 1.4; word-break: break-word; }
  .todo-meta { display: flex; gap: 8px; margin-top: 4px; align-items: center; }
  .todo-cat {
    font-size: 0.65rem; font-weight: 700; padding: 2px 8px;
    border-radius: 4px; text-transform: uppercase;
  }
  .cat-마케팅 { background: rgba(91,141,239,0.15); color: var(--blue); }
  .cat-프로젝트 { background: rgba(167,139,250,0.15); color: var(--purple); }
  .cat-미팅 { background: rgba(255,215,64,0.12); color: var(--gold); }
  .cat-개인 { background: rgba(74,222,128,0.12); color: var(--green); }
  .cat-긴급 { background: var(--glow-red); color: var(--red); }
  .todo-date { font-size: 0.65rem; color: var(--text-muted); }

  .todo-del {
    background: none; border: none; color: var(--text-muted);
    cursor: pointer; font-size: 1rem; padding: 4px;
    transition: color 0.2s; opacity: 0;
  }
  .todo-item:hover .todo-del { opacity: 1; }
  .todo-del:hover { color: var(--red); }

  .empty-state {
    text-align: center; padding: 40px 0;
    color: var(--text-muted); font-size: 0.85rem;
  }

  @media (max-width: 420px) {
    .stats { gap: 6px; }
    .stat { padding: 10px 4px; }
    .stat-num { font-size: 1.1rem; }
  }
</style>
</head>
<body>

<!-- LOCK SCREEN -->
<div id="lock-screen">
  <h1>🔥 불개미 TODO</h1>
  <div class="subtitle">비밀번호를 입력하세요</div>
  <input type="password" id="pw-input" placeholder="비밀번호" autofocus>
  <button onclick="tryUnlock()">입장</button>
  <div class="lock-error" id="lock-error"></div>
  <div class="lock-setup" id="lock-setup"></div>
</div>

<!-- MAIN APP -->
<div id="app">
  <div class="nav">
    <div class="nav-brand">📋 불개미 TODO</div>
    <div class="nav-right">
      <button class="nav-btn" onclick="exportData()">📤 백업</button>
      <button class="nav-btn" onclick="lockApp()">🔒 잠금</button>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num red" id="stat-total">0</div>
      <div class="stat-label">전체</div>
    </div>
    <div class="stat">
      <div class="stat-num gold" id="stat-pending">0</div>
      <div class="stat-label">진행중</div>
    </div>
    <div class="stat">
      <div class="stat-num green" id="stat-done">0</div>
      <div class="stat-label">완료</div>
    </div>
  </div>

  <!-- ADD FORM -->
  <div class="add-form">
    <input class="add-input" id="todo-input" placeholder="할 일 입력..." onkeydown="if(event.key==='Enter')addTodo()">
    <div class="add-row2">
      <select class="cat-select" id="cat-select">
        <option value="마케팅">마케팅</option>
        <option value="프로젝트">프로젝트</option>
        <option value="미팅">미팅</option>
        <option value="개인">개인</option>
        <option value="긴급">🔥 긴급</option>
      </select>
      <button class="add-btn" onclick="addTodo()">추가 +</button>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <button class="filter-btn active" onclick="setFilter('all', this)">전체</button>
    <button class="filter-btn" onclick="setFilter('pending', this)">진행중</button>
    <button class="filter-btn" onclick="setFilter('done', this)">완료</button>
    <button class="filter-btn" onclick="setFilter('긴급', this)">🔥 긴급</button>
    <button class="filter-btn" onclick="setFilter('마케팅', this)">마케팅</button>
    <button class="filter-btn" onclick="setFilter('프로젝트', this)">프로젝트</button>
    <button class="filter-btn" onclick="setFilter('미팅', this)">미팅</button>
    <button class="filter-btn" onclick="setFilter('개인', this)">개인</button>
  </div>

  <!-- TODO LIST -->
  <div id="todo-list"></div>
</div>

<script>
const STORE_KEY = 'fireant_todos';
const PW_KEY = 'fireant_todo_pw';
let todos = [];
let currentFilter = 'all';

// ── AUTH ──
function tryUnlock() {
  const input = document.getElementById('pw-input').value;
  const stored = localStorage.getItem(PW_KEY);
  
  if (!stored) {
    // First time — set password
    if (input.length < 4) {
      document.getElementById('lock-error').textContent = '4자리 이상 입력해주세요';
      return;
    }
    localStorage.setItem(PW_KEY, btoa(input));
    unlock();
    return;
  }
  
  if (btoa(input) === stored) {
    unlock();
  } else {
    document.getElementById('lock-error').textContent = '비밀번호가 틀렸습니다';
    document.getElementById('pw-input').value = '';
  }
}

function unlock() {
  document.getElementById('lock-screen').style.display = 'none';
  document.getElementById('app').style.display = 'block';
  loadTodos();
  render();
}

function lockApp() {
  document.getElementById('app').style.display = 'none';
  document.getElementById('lock-screen').style.display = 'flex';
  document.getElementById('pw-input').value = '';
  document.getElementById('lock-error').textContent = '';
}

// Check if first time
if (!localStorage.getItem(PW_KEY)) {
  document.getElementById('lock-setup').textContent = '처음이시군요! 비밀번호를 설정해주세요';
}

document.getElementById('pw-input').addEventListener('keydown', e => {
  if (e.key === 'Enter') tryUnlock();
});

// ── DATA ──
function loadTodos() {
  try { todos = JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { todos = []; }
}

function saveTodos() {
  localStorage.setItem(STORE_KEY, JSON.stringify(todos));
}

function addTodo() {
  const input = document.getElementById('todo-input');
  const text = input.value.trim();
  if (!text) return;
  
  todos.unshift({
    id: Date.now(),
    text,
    cat: document.getElementById('cat-select').value,
    done: false,
    created: new Date().toISOString()
  });
  
  input.value = '';
  saveTodos();
  render();
}

function toggleTodo(id) {
  const t = todos.find(t => t.id === id);
  if (t) t.done = !t.done;
  saveTodos();
  render();
}

function deleteTodo(id) {
  todos = todos.filter(t => t.id !== id);
  saveTodos();
  render();
}

function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  render();
}

function render() {
  let filtered = todos;
  if (currentFilter === 'pending') filtered = todos.filter(t => !t.done);
  else if (currentFilter === 'done') filtered = todos.filter(t => t.done);
  else if (currentFilter !== 'all') filtered = todos.filter(t => t.cat === currentFilter);

  // Stats
  document.getElementById('stat-total').textContent = todos.length;
  document.getElementById('stat-pending').textContent = todos.filter(t => !t.done).length;
  document.getElementById('stat-done').textContent = todos.filter(t => t.done).length;

  const list = document.getElementById('todo-list');
  if (filtered.length === 0) {
    list.innerHTML = '<div class="empty-state">할 일이 없습니다 🎉</div>';
    return;
  }

  // Sort: undone first (urgent first), then done
  filtered.sort((a, b) => {
    if (a.done !== b.done) return a.done ? 1 : -1;
    if (!a.done && a.cat === '긴급' && b.cat !== '긴급') return -1;
    if (!a.done && b.cat === '긴급' && a.cat !== '긴급') return 1;
    return 0;
  });

  list.innerHTML = filtered.map(t => {
    const d = new Date(t.created);
    const dateStr = `${d.getMonth()+1}/${d.getDate()}`;
    return `<div class="todo-item ${t.done ? 'done' : ''}">
      <div class="todo-check ${t.done ? 'checked' : ''}" onclick="toggleTodo(${t.id})"></div>
      <div class="todo-body">
        <div class="todo-text">${escHtml(t.text)}</div>
        <div class="todo-meta">
          <span class="todo-cat cat-${t.cat}">${t.cat}</span>
          <span class="todo-date">${dateStr}</span>
        </div>
      </div>
      <button class="todo-del" onclick="deleteTodo(${t.id})">×</button>
    </div>`;
  }).join('');
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function exportData() {
  const blob = new Blob([JSON.stringify(todos, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `fireant-todo-${new Date().toISOString().slice(0,10)}.json`;
  a.click();
}
</script>
</body>
</html>
