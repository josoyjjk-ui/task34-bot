<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+KR:wght@400;700&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    background: #F5F0EB;
    font-family: 'Noto Sans KR', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 16px 20px;
  }
  .top-line {
    width: 100%;
    height: 4px;
    background: #C41E1E;
    margin-bottom: 12px;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 14px;
  }
  .header img.fireant-logo {
    width: 130px;
    height: 130px;
    object-fit: contain;
  }
  .header h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 88px;
    color: #C41E1E;
    letter-spacing: 4px;
  }
  .project-logo {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 20px;
  }
  .project-logo img {
    width: 90px;
    height: 90px;
    border-radius: 14px;
  }
  .project-logo span {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 72px;
    color: #222;
    letter-spacing: 3px;
  }
  .cards {
    display: flex;
    gap: 16px;
    width: 100%;
    justify-content: center;
  }
  .card {
    width: 218px;
    border-radius: 8px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
  }
  .card-body {
    height: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 12px;
    font-weight: 700;
    font-size: 22px;
    color: #fff;
    line-height: 1.4;
  }
  .card:nth-child(1) .card-body { background: #E8E8E8; color: #333; }
  .card:nth-child(2) .card-body { background: #D4D4D4; color: #333; }
  .card:nth-child(3) .card-body { background: #999; }
  .card:nth-child(4) .card-body { background: #666; }
  .card:nth-child(5) .card-body { background: #222; }
  .card-platform {
    background: #C41E1E;
    color: #fff;
    text-align: center;
    padding: 6px;
    font-size: 14px;
    font-weight: 700;
    letter-spacing: 1px;
  }
  .card-label {
    background: #F5F0EB;
    text-align: center;
    padding: 8px 4px;
    font-size: 13px;
    color: #555;
    line-height: 1.3;
  }
  .card-label strong {
    display: block;
    color: #222;
    font-size: 14px;
  }
</style>
</head>
<body>
  <div class="top-line"></div>
  <div class="header">
    <img class="fireant-logo" src="fireant-logo-nobg.png" alt="fireant">
    <h1>FIREWEEK</h1>
  </div>
  <div class="project-logo">
    <img src="blockstreet-logo.jpg" alt="Block Street">
    <span>BLOCK STREET</span>
  </div>
  <div class="cards">
    <div class="card">
      <div class="card-body">EDUCATIONAL<br>CONTENTS</div>
      <div class="card-platform">YOUTUBE</div>
      <div class="card-label"><strong>BLOCK STREET</strong>완벽분석영상</div>
    </div>
    <div class="card">
      <div class="card-body">PRODUCT<br>EXPERIENCE</div>
      <div class="card-platform">TELEGRAM</div>
      <div class="card-label"><strong>BLOCK STREET</strong>사용해보기</div>
    </div>
    <div class="card">
      <div class="card-body">AMA<br>TRAINING</div>
      <div class="card-platform">TWITTER</div>
      <div class="card-label"><strong>BLOCK STREET</strong>AMA 진행</div>
    </div>
    <div class="card">
      <div class="card-body">REVIEW<br>& YAPPING</div>
      <div class="card-platform">TELEGRAM</div>
      <div class="card-label"><strong>BLOCK STREET</strong>후기 야핑이벤트</div>
    </div>
    <div class="card">
      <div class="card-body">REWARD</div>
      <div class="card-platform">TELEGRAM</div>
      <div class="card-label"><strong>BLOCK STREET</strong>리워드 지급</div>
    </div>
  </div>
</body>
</html>
