<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 700px;
    background-color: #1a4a1a;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', sans-serif;
    display: flex;
    flex-direction: column;
    padding: 24px 28px 24px 28px;
  }
  .title-row {
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    margin-bottom: 20px;
  }
  .logo {
    position: absolute;
    left: 0;
    font-size: 42px;
    line-height: 1;
  }
  .title-text {
    font-size: 68px;
    font-weight: 900;
    color: #FFE600;
    letter-spacing: -1px;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.4);
  }
  .date-text {
    position: absolute;
    right: 0;
    bottom: 6px;
    font-size: 26px;
    color: #ffffff;
    font-weight: 600;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 14px;
    flex: 1;
  }
  .box {
    background-color: #0f3a0f;
    border: 3px solid #2d6a2d;
    border-radius: 10px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 18px 28px;
  }
  .box-header {
    font-size: 34px;
    font-weight: 800;
    color: #FFE600;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }
  .box-sub {
    font-size: 16px;
    color: #aaaaaa;
    margin-bottom: 10px;
    letter-spacing: 0;
  }
  .data-line {
    font-size: 30px;
    font-weight: 700;
    line-height: 1.5;
  }
  .red { color: #FF4444; }
  .green { color: #44FF44; }
  .white { color: #ffffff; }
  .center-box {
    align-items: center;
    text-align: center;
  }
  .center-box .box-header { text-align: center; }
  .center-box .data-line { text-align: center; }
</style>
</head>
<body>
  <div class="title-row">
    <div class="logo">🔥🐜</div>
    <div class="title-text">불개미 일일시황</div>
    <div class="date-text">2026.03.29 (KST)</div>
  </div>

  <div class="grid">
    <!-- TOP LEFT -->
    <div class="box">
      <div class="box-header">BTC ETH ETF 유출입</div>
      <div class="box-sub">ETF 데이터는 마지막 거래일 기준</div>
      <div class="data-line red">BTC (-$225.48M) ↓</div>
      <div class="data-line red">ETH (-$48.54M) ↓</div>
    </div>

    <!-- TOP RIGHT -->
    <div class="box center-box">
      <div class="box-header">미결제약정 추이</div>
      <div class="data-line red">BTC 24시간 : -0.12% ↓</div>
      <div class="data-line red">ETH 24시간 : -0.72% ↓</div>
    </div>

    <!-- BOTTOM LEFT -->
    <div class="box center-box">
      <div class="box-header">DAT 추이</div>
      <div class="data-line white">WEEKLY NET INFLOW : $95.78M</div>
    </div>

    <!-- BOTTOM RIGHT -->
    <div class="box center-box">
      <div class="box-header">코인베이스 프리미엄</div>
      <div class="data-line red">현재 지수 : -0.0034%</div>
    </div>
  </div>
</body>
</html>
