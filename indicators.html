<!DOCTYPE html>
<html lang="ko" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>불개미 시장 지표</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔥</text></svg>">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;600;700;900&display=swap');
  @import url('https://cdn.jsdelivr.net/npm/geist@1.3.0/dist/fonts/geist-sans/style.css');
  :root,[data-theme="dark"]{--bg:#08080f;--surface:rgba(255,255,255,0.04);--border:rgba(255,255,255,0.08);--red:#FF3B3B;--orange:#FF6B35;--gold:#FFD740;--text:#E8E8ED;--text-dim:#6B6B80;--text-muted:#3E3E50;--nav-bg:rgba(8,8,15,0.85);}
  [data-theme="light"]{--bg:#F5F5F7;--surface:rgba(0,0,0,0.03);--border:rgba(0,0,0,0.08);--text:#1A1A2E;--text-dim:#5A5A72;--text-muted:#9E9EB5;--nav-bg:rgba(245,245,247,0.9);}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{font-family:'Geist','Noto Sans KR',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased;}
  canvas#particles{position:fixed;top:0;left:0;width:100%;height:100%;z-index:0;pointer-events:none;opacity:0.6;}
  .wrap{position:relative;z-index:1;max-width:600px;margin:0 auto;padding:0 16px 60px;}
  .nav{position:sticky;top:0;z-index:100;background:var(--nav-bg);backdrop-filter:blur(12px);padding:10px 16px;display:flex;align-items:center;justify-content:center;border-bottom:1px solid var(--border);}
  .nav-inner{display:flex;align-items:center;width:100%;max-width:720px;justify-content:center;}
  .nav-links{display:flex;gap:6px;align-items:center;justify-content:center;}
  .nav-links a{font-size:0.78rem;font-weight:600;color:var(--text-dim);text-decoration:none;padding:5px 10px;border-radius:8px;transition:all 0.2s;}
  .nav-links a:hover{color:var(--text);background:var(--surface);}
  .theme-toggle{background:none;border:1px solid var(--border);border-radius:8px;color:var(--text);padding:5px 8px;cursor:pointer;font-size:0.85rem;}

  /* COMING SOON */
  .coming-wrap{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;gap:24px;text-align:center;padding:40px 20px;}
  .coming-logo{width:90px;height:90px;border-radius:50%;background:rgba(255,107,53,0.1);border:2px solid rgba(255,107,53,0.3);display:flex;align-items:center;justify-content:center;font-size:3rem;animation:pulse 2.5s ease-in-out infinite;}
  @keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(255,107,53,0.3);}50%{box-shadow:0 0 0 16px rgba(255,107,53,0);}}
  .coming-title{font-size:1.6rem;font-weight:900;color:var(--text);}
  .coming-sub{font-size:0.95rem;color:var(--text-dim);line-height:1.7;max-width:320px;}
  .coming-badge{background:rgba(255,215,64,0.1);border:1px solid rgba(255,215,64,0.3);border-radius:20px;padding:6px 16px;font-size:0.78rem;font-weight:700;color:var(--gold);letter-spacing:1px;}
  .coming-preview{display:flex;flex-direction:column;gap:10px;width:100%;max-width:340px;margin-top:8px;}
  .preview-item{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:12px;opacity:0.5;}
  .preview-icon{font-size:1.3rem;flex-shrink:0;}
  .preview-label{font-size:0.85rem;font-weight:700;color:var(--text);}
  .preview-sub{font-size:0.72rem;color:var(--text-dim);margin-top:2px;}
  .back-btn{display:inline-flex;align-items:center;gap:6px;font-size:0.82rem;color:var(--text-dim);text-decoration:none;border:1px solid var(--border);border-radius:8px;padding:8px 16px;transition:all 0.2s;}
  .back-btn:hover{color:var(--text);border-color:rgba(255,107,53,0.4);}
</style>
</head>
<body>
<canvas id="particles"></canvas>

<div class="nav">
  <div class="nav-inner">
    <div class="nav-links">
      <a href="/" style="color:var(--text-dim);">불개미 Crypto</a>
      <a href="/feed/" style="color:var(--text-dim);">정기 시장분석</a>
      <a href="/events/" style="color:var(--text-dim);">이벤트</a>
      <a href="/indicators/" style="color:var(--text);font-weight:800;">불개미지표</a>
    </div>
  </div>
</div>

<div class="wrap">
  <div class="coming-wrap">

    <div class="coming-logo">
      <img src="https://raw.githubusercontent.com/nickandfireant/fireant-assets/main/fireant-logo.png"
           alt="불개미" style="width:60px;height:60px;border-radius:50%;object-fit:cover;"
           onerror="this.replaceWith(Object.assign(document.createElement('span'),{textContent:'🔥'}))">
    </div>

    <div>
      <div class="coming-title">불개미 시장 지표</div>
    </div>

    <span class="coming-badge">COMING SOON</span>

    <div class="coming-sub">
      불개미만의 크립토 시장 지표를<br>준비 중입니다.
    </div>

    <div class="coming-preview">
      <div class="preview-item">
        <span class="preview-icon">📊</span>
        <div>
          <div class="preview-label">불개미 센티멘트 지수</div>
          <div class="preview-sub">ETF 수급 + 온체인 + 공포탐욕 통합 지표</div>
        </div>
      </div>
      <div class="preview-item">
        <span class="preview-icon">🐋</span>
        <div>
          <div class="preview-label">고래 움직임 트래커</div>
          <div class="preview-sub">대형 지갑 실시간 이동 현황</div>
        </div>
      </div>
      <div class="preview-item">
        <span class="preview-icon">🇰🇷</span>
        <div>
          <div class="preview-label">한국 시장 온도계</div>
          <div class="preview-sub">김치 프리미엄 · 거래소 수급 · KOL 트렌드</div>
        </div>
      </div>
    </div>

    <a href="/" class="back-btn">← 홈으로 돌아가기</a>

  </div>
</div>

<script>
// PARTICLES
const canvas = document.getElementById('particles');
const ctx = canvas.getContext('2d');
let W, H, particles = [];
function resize(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);
class P{constructor(i){this.reset();if(i){this.y=Math.random()*H;this.life=Math.random()*120;}}reset(){this.x=Math.random()*W;this.y=H+5;this.size=Math.random()*2.5+0.5;this.vy=-(Math.random()*1.2+0.2);this.vx=(Math.random()-0.5)*0.4;this.opacity=Math.random()*0.35+0.05;this.hue=Math.random()>0.6?0:20;this.life=0;this.maxLife=Math.random()*250+80;}update(){this.y+=this.vy;this.x+=this.vx+Math.sin(this.life*0.015)*0.2;this.life++;this.opacity*=0.997;if(this.life>this.maxLife||this.y<-10||this.opacity<0.005)this.reset();}draw(){ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fillStyle=`hsla(${this.hue},100%,55%,${this.opacity})`;ctx.fill();}}
for(let i=0;i<50;i++)particles.push(new P(true));
(function animate(){ctx.clearRect(0,0,W,H);particles.forEach(p=>{p.update();p.draw();});requestAnimationFrame(animate);})();
// THEME
const btn=document.getElementById('themeToggle');
const html=document.documentElement;
const saved=localStorage.getItem('fa-theme');
if(saved){html.setAttribute('data-theme',saved);btn.textContent=saved==='light'?'☀️':'🌙';}
btn.addEventListener('click',()=>{const c=html.getAttribute('data-theme')||'dark';const n=c==='dark'?'light':'dark';html.setAttribute('data-theme',n);btn.textContent=n==='light'?'☀️':'🌙';localStorage.setItem('fa-theme',n);});
</script>
</body>
</html>
