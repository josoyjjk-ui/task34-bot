<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@700;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 675px;
    background-color: #0e1f0e;
    font-family: 'Apple SD Gothic Neo', 'Noto Sans KR', 'Malgun Gothic', Arial, sans-serif;
    display: flex;
    flex-direction: column;
    padding: 20px 24px 20px 24px;
  }
  .title-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    padding: 0 4px;
  }
  .title-text {
    font-size: 66px;
    font-weight: 900;
    color: #FFE600;
    letter-spacing: -1px;
    line-height: 1;
  }
  .date-text {
    font-size: 34px;
    color: #FFE600;
    font-weight: 700;
    letter-spacing: 0;
  }
  .grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    grid-template-rows: 1fr 1fr;
    gap: 12px;
    flex: 1;
  }
  .box {
    background-color: #0a1e0a;
    border: 3px solid #5aaa5a;
    border-radius: 8px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    padding: 16px 24px;
    text-align: center;
  }
  .box-header {
    font-size: 36px;
    font-weight: 900;
    color: #FFE600;
    margin-bottom: 10px;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }
  .box-sub {
    font-size: 16px;
    color: #aaaaaa;
    margin-bottom: 10px;
  }
  .data-line {
    font-size: 38px;
    font-weight: 800;
    line-height: 1.55;
    letter-spacing: -0.5px;
  }
  .red { color: #FF3333; }
  .green { color: #44EE44; }
  .white { color: #ffffff; }
  .dat-line {
    font-size: 32px;
    font-weight: 700;
    color: #ffffff;
    letter-spacing: 0.5px;
  }
</style>
</head>
<body>
  <div class="title-row">
    <div class="title-text">불개미 일일시황</div>
    <div class="date-text">2026.04.03 (금)</div>
  </div>

  <div class="grid">
    <!-- TOP LEFT: ETF -->
    <div class="box">
      <div class="box-header">BTC ETH ETF 유출입</div>
      <div class="box-sub">ETF 데이터는 마지막 거래일 기준</div>
      <div class="data-line green">BTC (+$8.99M)</div>
      <div class="data-line red">ETH (-$71.17M)</div>
    </div>

    <!-- TOP RIGHT: OI -->
    <div class="box">
      <div class="box-header">미결제약정 추이</div>
      <div class="data-line">
        <span style="color:#ffffff;">BTC 24시간 : </span><span class="green">+1.11%</span>
      </div>
      <div class="data-line">
        <span style="color:#ffffff;">ETH 24시간 : </span><span class="green">+0.11%</span>
      </div>
    </div>

    <!-- BOTTOM LEFT: DAT -->
    <div class="box">
      <div class="box-header">DAT 추이</div>
      <div class="dat-line white">WEEKLY NET INFLOW : $72.83K</div>
    </div>

    <!-- BOTTOM RIGHT: CB Premium -->
    <div class="box">
      <div class="box-header">코인베이스 프리미엄</div>
      <div class="data-line">
        <span style="color:#ffffff;">현재 지수 : </span><span class="green">+0.0508%</span>
      </div>
    </div>
  </div>
</body>
</html>
